<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>踏踏 MiniSteps - 商店完整版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffb6c1; --primary-blue: #a2d2ff; --bg-base: #f8fafd;
            --glass: rgba(255, 255, 255, 0.9); --shadow: 0 10px 30px rgba(162, 180, 200, 0.15);
        }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: -apple-system, "Noto Sans TC", sans-serif; background: #eef2f7; overflow: hidden; }
        #app { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; background: var(--bg-base); position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.1); }

        /* --- 側選單與遮罩 --- */
        .drawer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 998; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px); }
        .drawer-overlay.active { opacity: 1; visibility: visible; }
        .drawer { position: absolute; top: 0; left: -310px; width: 300px; height: 100%; background: white; z-index: 999; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); padding: 50px 25px; box-sizing: border-box; display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(310px); }

        /* --- Header --- */
        .header { padding: 20px; background: var(--glass); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 10; }
        .header-title { color: var(--primary-pink); font-weight: 900; font-size: 1.25rem; }

        /* --- 內容區 --- */
        .content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 110px; }
        .view { display: none; }
        .view.active { display: block; }

        /* --- 通用卡片與輸入 --- */
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        textarea { width: 100%; min-height: 80px; max-height: 200px; resize: vertical; border: none; border-radius: 15px; background: #f4f7fa; padding: 15px; box-sizing: border-box; margin-top: 15px; font-size: 1rem; }
        .input-field { width: 100%; border: none; background: #f4f7fa; padding: 12px; border-radius: 12px; text-align: center; font-size: 1.1rem; box-sizing: border-box; }

        /* --- 商店特有樣式 --- */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .product-img { height: 120px; background: #f0f4f8; display: flex; align-items: center; justify-content: center; color: var(--primary-blue); font-size: 2.5rem; }
        .product-info { padding: 12px; }
        .product-title { font-size: 0.9rem; font-weight: bold; color: #444; margin-bottom: 5px; }
        .product-price { font-size: 0.85rem; color: var(--primary-pink); font-weight: 800; }
        .buy-btn { width: 100%; border: none; background: var(--primary-blue); color: white; padding: 8px; border-radius: 10px; margin-top: 10px; font-size: 0.8rem; cursor: pointer; }

        /* --- 年曆格子與彈窗 --- */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
        .cal-day { aspect-ratio: 1; background: white; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #ccc; cursor: pointer; border: 1px solid #f0f0f0; }
        .cal-day.has-data { background: var(--primary-pink); color: white; border: none; }
        .cal-day.today { border: 2px solid var(--primary-blue); color: var(--primary-blue); font-weight: bold; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { width: 85%; background: white; border-radius: 30px; padding: 25px; position: relative; animation: zoomIn 0.3s; }

        /* --- 導覽列 --- */
        .nav-bar { position: absolute; bottom: 20px; left: 15px; right: 15px; height: 70px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); z-index: 50; }
        .nav-item { text-align: center; color: #ccc; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary-pink); }
        .nav-item span { font-size: 10px; display: block; margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="drawer-overlay" id="overlay" onclick="toggleDrawer(false)"></div>
    <div class="drawer" id="drawer">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 70px; height: 70px; background: var(--primary-pink); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; font-weight: bold;">年</div>
            <h3 style="margin: 10px 0 0 0;">阿年 (Ah-Nian)</h3>
            <div style="color: var(--primary-pink); font-size: 0.7rem; font-weight: bold;">Premium Member</div>
        </div>
        <div style="flex: 1; color: #555;">
            <div style="padding: 15px 0; border-bottom: 1px solid #eee;"><i class="fas fa-user-circle"></i> 帳號顯示與編輯</div>
            <div style="padding: 15px 0; border-bottom: 1px solid #eee;"><i class="fas fa-crown"></i> 訂閱內容管理</div>
            <div style="padding: 15px 0; border-bottom: 1px solid #eee;"><i class="fas fa-cog"></i> 系統設定</div>
        </div>
        <div style="padding: 15px 0; color: #ff9aa9;"><i class="fas fa-sign-out-alt"></i> 安全登出</div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 id="mDate" style="color: var(--primary-blue); margin: 0 0 15px 0;">127Days</h2>
            <div style="width: 100%; height: 160px; background: #f0f4f8; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #ccc; margin-bottom: 15px;"><i class="fas fa-image fa-3x"></i></div>
            <p id="mNote" style="color: #666; font-size: 0.9rem;">尚未紀錄心情...</p>
            <div style="display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                <div style="flex: 1; background: #f8fafd; padding: 8px; border-radius: 10px; text-align: center;"><small>身高</small><br><strong id="mH">--</strong> cm</div>
                <div style="flex: 1; background: #f8fafd; padding: 8px; border-radius: 10px; text-align: center;"><small>體重</small><br><strong id="mW">--</strong> kg</div>
            </div>
        </div>
    </div>

    <div class="header">
        <i class="fas fa-bars" onclick="toggleDrawer(true)" style="cursor: pointer; color: var(--primary-pink);"></i>
        <div class="header-title">踏踏 MiniSteps</div>
        <i class="fas fa-camera" style="color: var(--primary-blue);"></i>
    </div>

    <div class="content">
        <div id="view-today" class="view active">
            <div class="card">
                <span style="color: var(--primary-blue); font-weight: 900; font-size: 2.2rem;">127Days</span>
                <textarea id="todayNote" placeholder="寫下此刻的心情..."></textarea>
                <button onclick="saveToday()" style="width: 100%; padding: 15px; background: var(--primary-pink); color: white; border: none; border-radius: 15px; margin-top: 15px; font-weight: bold;">儲存足跡照片與心得</button>
            </div>
        </div>

        <div id="view-growth" class="view">
            <h3 style="margin-left: 10px; color: #555;">📈 紀錄成長數據</h3>
            <div class="card">
                <div style="display: flex; gap: 15px;">
                    <div style="flex:1;"><label style="font-size: 0.7rem; color: #999;">身高 (cm)</label><input type="number" id="hInput" class="input-field"></div>
                    <div style="flex:1;"><label style="font-size: 0.7rem; color: #999;">體重 (kg)</label><input type="number" id="wInput" class="input-field"></div>
                </div>
                <button onclick="saveGrowth()" style="width: 100%; padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 15px; margin-top: 20px; font-weight: bold;">儲存並同步至年曆</button>
            </div>
        </div>

        <div id="view-calendar" class="view">
            <h3 style="margin-left: 10px; color: #555;">🗓️ 2026 足跡年曆</h3>
            <div class="calendar-grid" id="grid"></div>
        </div>

        <div id="view-shop" class="view">
            <h3 style="margin-left: 10px; color: #555;">🛍️ 足跡紀念品店</h3>
            <div class="product-grid">
                <div class="product-card">
                    <div class="product-img"><i class="fas fa-calendar-alt"></i></div>
                    <div class="product-info">
                        <div class="product-title">客製化 2026 年曆</div>
                        <div class="product-price">TWD 599</div>
                        <button class="buy-btn" onclick="alert('已加入購物車')">加入購物車</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-img"><i class="fas fa-book-open"></i></div>
                    <div class="product-info">
                        <div class="product-title">寶寶成長紀錄書</div>
                        <div class="product-price">TWD 850</div>
                        <button class="buy-btn" onclick="alert('已加入購物車')">加入購物車</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-img"><i class="fas fa-images"></i></div>
                    <div class="product-info">
                        <div class="product-title">布紋精裝相簿</div>
                        <div class="product-price">TWD 1,200</div>
                        <button class="buy-btn" onclick="alert('已加入購物車')">加入購物車</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-img"><i class="fas fa-portrait"></i></div>
                    <div class="product-info">
                        <div class="product-title">簡約木質相框</div>
                        <div class="product-price">TWD 350</div>
                        <button class="buy-btn" onclick="alert('已加入購物車')">加入購物車</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('today', this)"><i class="fas fa-heart"></i><span>今日紀錄</span></div>
        <div class="nav-item" onclick="switchTab('growth', this)"><i class="fas fa-chart-line"></i><span>成長數據</span></div>
        <div class="nav-item" onclick="switchTab('calendar', this)"><i class="fas fa-calendar-alt"></i><span>年曆預覽</span></div>
        <div class="nav-item" onclick="switchTab('shop', this)"><i class="fas fa-shopping-bag"></i><span>商店</span></div>
    </div>
</div>

<script>
    let db = { 120: { note: "第一次笑出聲！", h: 63.5, w: 6.8 }, 125: { note: "抓周練習。", h: 65.2, w: 7.1 } };
    const currentD = 127;

    function toggleDrawer(open) { document.getElementById('drawer').classList.toggle('open', open); document.getElementById('overlay').classList.toggle('active', open); }
    function switchTab(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(viewId === 'calendar') renderGrid();
    }
    function renderGrid() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        for(let i = 118; i <= 138; i++) {
            const day = document.createElement('div');
            day.className = 'cal-day' + (i === currentD ? ' today' : '') + (db[i] ? ' has-data' : '');
            day.innerHTML = `<span>D+</span><strong>${i}</strong>`;
            day.onclick = () => showDetail(i);
            grid.appendChild(day);
        }
    }
    function showDetail(day) {
        const data = db[day] || { note: "尚未紀錄...", h: "--", w: "--" };
        document.getElementById('mDate').innerText = day + " Days";
        document.getElementById('mNote').innerText = data.note;
        document.getElementById('mH').innerText = data.h;
        document.getElementById('mW').innerText = data.w;
        document.getElementById('modalOverlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function saveToday() { if(!db[currentD]) db[currentD] = {}; db[currentD].note = document.getElementById('todayNote').value; alert("心得已儲存！"); }
    function saveGrowth() { if(!db[currentD]) db[currentD] = {}; db[currentD].h = document.getElementById('hInput').value; db[currentD].w = document.getElementById('wInput').value; alert("數據已同步至年曆！"); }
    renderGrid();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>踏踏 MiniSteps - 1000天全邏輯版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffb6c1; --primary-blue: #a2d2ff; --bg-base: #f8fafd;
            --glass: rgba(255, 255, 255, 0.9); --shadow: 0 10px 30px rgba(162, 180, 200, 0.15);
        }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: -apple-system, "Noto Sans TC", sans-serif; background: #eef2f7; overflow: hidden; }
        #app { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; background: var(--bg-base); position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.1); }

        /* --- 側選單 --- */
        .drawer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 998; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px); }
        .drawer-overlay.active { opacity: 1; visibility: visible; }
        .drawer { position: absolute; top: 0; left: -310px; width: 300px; height: 100%; background: white; z-index: 999; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); padding: 50px 25px; box-sizing: border-box; }
        .drawer.open { transform: translateX(310px); }

        /* --- Header --- */
        .header { padding: 15px 20px; background: var(--glass); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 10; }
        
        /* --- 測試用天數調整區 --- */
        .test-tool { background: #eee; padding: 5px 15px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #666; }
        .test-input { width: 50px; border: 1px solid #ddd; border-radius: 5px; text-align: center; padding: 2px; }

        .content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 110px; }
        .view { display: none; }
        .view.active { display: block; }

        /* --- 顯著照片上傳區 --- */
        .photo-upload-zone { 
            width: 100%; height: 220px; background: white; border-radius: 30px; 
            border: 2px dashed var(--primary-pink); margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; box-shadow: var(--shadow);
            background-size: cover; background-position: center;
        }
        .photo-upload-zone:active { transform: scale(0.98); background-color: #fffafa; }
        .photo-upload-zone i { color: var(--primary-pink); font-size: 3rem; margin-bottom: 10px; }

        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .days-label { color: var(--primary-blue); font-weight: 900; font-size: 2.4rem; line-height: 1; }
        textarea { width: 100%; min-height: 100px; resize: vertical; border: none; border-radius: 15px; background: #f4f7fa; padding: 15px; box-sizing: border-box; margin-top: 15px; font-size: 1rem; }

        /* --- 商店 & 年曆 --- */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
        .product-img { height: 100px; background: #f0f4f8; display: flex; align-items: center; justify-content: center; color: var(--primary-blue); font-size: 2rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-day { aspect-ratio: 1; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #ccc; cursor: pointer; border: 1px solid #f0f0f0; }
        .cal-day.has-data { background: var(--primary-pink); color: white; border: none; }
        .cal-day.today { border: 2px solid var(--primary-blue); color: var(--primary-blue); font-weight: bold; }

        /* --- 彈窗 --- */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { width: 85%; background: white; border-radius: 30px; padding: 25px; animation: zoomIn 0.3s; }

        /* --- 導覽列 --- */
        .nav-bar { position: absolute; bottom: 20px; left: 15px; right: 15px; height: 70px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); z-index: 50; }
        .nav-item { text-align: center; color: #ccc; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary-pink); }
    </style>
</head>
<body>

<div id="app">
    <div class="drawer-overlay" id="overlay" onclick="toggleDrawer(false)"></div>
    <div class="drawer" id="drawer">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 60px; height: 60px; background: var(--primary-pink); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">年</div>
            <h3 style="margin-top: 10px;">阿年</h3>
            <p style="font-size: 0.7rem; color: var(--primary-pink);">Premium Plan</p>
        </div>
        <div style="color: #666; font-size: 0.9rem;">
            <div style="padding: 15px 0; border-bottom: 1px solid #eee;">帳號設定</div>
            <div style="padding: 15px 0; border-bottom: 1px solid #eee;">訂閱方案內容</div>
            <div style="padding: 15px 0; border-bottom: 1px solid #eee;">歷史訂單</div>
            <div style="padding: 15px 0; color: #ffb6c1;">安全登出</div>
        </div>
    </div>

    <div class="test-tool">
        <i class="fas fa-tools"></i> 測試模擬器：跳轉天數 <input type="number" id="testDayInput" class="test-input" value="127" onchange="jumpDay()">
    </div>

    <div class="header">
        <i class="fas fa-bars" onclick="toggleDrawer(true)" style="color: var(--primary-pink); cursor: pointer;"></i>
        <div style="color: var(--primary-pink); font-weight: 900;">踏踏 MiniSteps</div>
        <i class="fas fa-cog" style="color: var(--primary-blue);"></i>
    </div>

    <div class="content">
        <div id="view-today" class="view active">
            <div class="photo-upload-zone" id="photoZone" onclick="simulateUpload()">
                <i class="fas fa-camera"></i>
                <span style="font-weight: bold; color: #888;">點擊捕捉/上傳今日足跡照片</span>
            </div>

            <div class="card">
                <span class="days-label" id="mainDayDisplay">127Days</span>
                <p id="dynamicTip" style="font-weight: 600; color: #444; margin-top: 10px; min-height: 50px;">提示加載中...</p>
                <textarea id="todayNote" placeholder="紀錄這張照片代表什麼意義？..."></textarea>
                <button onclick="saveToday()" style="width: 100%; padding: 15px; background: var(--primary-pink); color: white; border: none; border-radius: 15px; margin-top: 15px; font-weight: bold;">儲存足跡與心得</button>
            </div>
        </div>

        <div id="view-growth" class="view">
            <h3 style="margin-left: 10px; color: #555;">📈 成長數據</h3>
            <div class="card">
                <div style="display: flex; gap: 15px;">
                    <div style="flex:1;"><label style="font-size: 0.7rem; color: #999;">身高 (cm)</label><input type="number" id="hInput" class="input-field" placeholder="0.0"></div>
                    <div style="flex:1;"><label style="font-size: 0.7rem; color: #999;">體重 (kg)</label><input type="number" id="wInput" class="input-field" placeholder="0.0"></div>
                </div>
                <button onclick="saveGrowth()" style="width: 100%; padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 15px; margin-top: 20px; font-weight: bold;">儲存數據</button>
            </div>
        </div>

        <div id="view-calendar" class="view">
            <h3 id="calMonthTitle" style="margin-left: 10px; color: #555;">年度足跡</h3>
            <div class="calendar-grid" id="grid"></div>
        </div>

        <div id="view-shop" class="view">
            <h3 style="margin-left: 10px; color: #555;">商店</h3>
            <div class="product-grid">
                <div class="product-card"><div class="product-img"><i class="fas fa-calendar"></i></div><div style="padding:10px; font-size:0.8rem;">2026年曆</div></div>
                <div class="product-card"><div class="product-img"><i class="fas fa-book"></i></div><div style="padding:10px; font-size:0.8rem;">成長紀錄書</div></div>
                <div class="product-card"><div class="product-img"><i class="fas fa-images"></i></div><div style="padding:10px; font-size:0.8rem;">精裝相簿</div></div>
                <div class="product-card"><div class="product-img"><i class="fas fa-portrait"></i></div><div style="padding:10px; font-size:0.8rem;">木質相框</div></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 id="mDate" style="color: var(--primary-blue); margin: 0 0 10px 0;"></h2>
            <div id="mPhoto" style="width:100%; height:150px; background:#eee; border-radius:15px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; color:#ccc;"><i class="fas fa-image fa-2x"></i></div>
            <p id="mNote" style="color:#666; font-size:0.9rem; line-height:1.4;"></p>
            <div style="display:flex; gap:10px; border-top:1px solid #eee; padding-top:15px;">
                <div style="flex:1; background:#f8fafd; padding:8px; border-radius:10px; text-align:center;"><small>身高</small><br><strong id="mH"></strong> cm</div>
                <div style="flex:1; background:#f8fafd; padding:8px; border-radius:10px; text-align:center;"><small>體重</small><br><strong id="mW"></strong> kg</div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('today', this)"><i class="fas fa-heart"></i><span>今日</span></div>
        <div class="nav-item" onclick="switchTab('growth', this)"><i class="fas fa-chart-line"></i><span>成長</span></div>
        <div class="nav-item" onclick="switchTab('calendar', this)"><i class="fas fa-calendar-alt"></i><span>年曆</span></div>
        <div class="nav-item" onclick="switchTab('shop', this)"><i class="fas fa-shopping-bag"></i><span>商店</span></div>
    </div>
</div>

<script>
    // --- 核心功能 1：1000天提示詞引擎 ---
    const tipsEngine = {
        // 0-6個月 (1-180天)：每日更新
        getTip: function(day) {
            if (day === 0) return "迎接新生命的降臨！拍下寶寶在產房的第一張照片，那是紀錄的起點。👶";
            if (day === 1) return "觀察寶寶的睡顏，是不是偶爾會有微小的抽動？這是大腦發育的信號。";
            if (day === 3) return "生理性脫皮開始了，小腳丫像在脫殼一樣，紀錄這脫胎換骨的瞬間。";
            if (day === 7) return "臍帶快要脫落了嗎？這是寶寶正式告別母體依賴的小里程碑。";
            if (day === 14) return "寶寶現在的視力範圍只有20公分，試著貼近他，讓他記住你的臉。";
            if (day === 30) return "滿月快樂！第一套正式的衣服穿起來了嗎？拍一張全家福吧！🌸";
            if (day === 60) return "社會性微笑出現了！對他笑一笑，紀錄他第一次有意義的回應。";
            if (day === 100) return "百日紀念！現在的頭部力量應該能稍微撐起了，紀錄他『抬頭挺胸』的模樣。💯";
            if (day === 128) return "視覺追蹤變強了，拿個彩色球慢慢移動，紀錄他專注的眼神。🎾";
            if (day === 180) return "半週歲囉！副食品挑戰開始了吗？紀錄第一次被酸到或驚訝的小表情。🍌";
            
            // 7-18個月 (181-540天)：每週兩次 (假設落在週一、週四)
            if (day > 180 && day <= 540) {
                if (day % 3 === 0) return "寶寶開始嘗試爬行了嗎？紀錄他用肚子貼地像小鱷魚移動的樣子。🐊";
                if (day % 7 === 0) return "周歲即將到來，練習站立的瞬間最珍貴，捕捉那晃晃悠悠的平衡感。";
                if (day === 365) return "一週歲！抓周紀錄是必備的，看看他第一件抓起的是什麼？🎂";
                return "今天也是充滿活力的一天，拍一張他在遊戲區探索的照片吧。";
            }

            // 19-36個月 (541-1000天)：每週一次
            if (day > 540 && day <= 1000) {
                if (day % 7 === 0) return "兩歲多的寶寶開始有主見了，紀錄他今天堅持要自己穿鞋或挑衣服的樣子。👞";
                if (day === 730) return "兩週歲紀念！他現在能說出完整的短句了嗎？錄下一段他稚嫩的聲音。🗣️";
                if (day === 1000) return "1000天達成！這是一場漫長而溫馨的馬拉松。回顧第一天，感受成長的奇蹟。📕";
                return "成長在不知不覺中發生，紀錄他今天與鄰居或同伴互動的小瞬間。";
            }
            return "每個瞬間都獨一無二，紀錄下寶寶今天的笑容吧。✨";
        }
    };

    let db = { 120: { note: "第一次叫爸爸", h: 63.5, w: 6.8 } };
    let currentDay = 127;

    function jumpDay() {
        currentDay = parseInt(document.getElementById('testDayInput').value);
        updateUI();
    }

    function updateUI() {
        document.getElementById('mainDayDisplay').innerText = currentDay + "Days";
        document.getElementById('dynamicTip').innerText = tipsEngine.getTip(currentDay);
        // 清空輸入框模擬新的一天
        document.getElementById('todayNote').value = db[currentDay] ? db[currentDay].note : "";
        document.getElementById('photoZone').style.backgroundImage = "none";
    }

    function switchTab(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(viewId === 'calendar') renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        // 顯示前後兩週
        for(let i = currentDay - 14; i <= currentDay + 14; i++) {
            if (i < 0) continue;
            const day = document.createElement('div');
            day.className = 'cal-day' + (i === currentDay ? ' today' : '') + (db[i] ? ' has-data' : '');
            day.innerHTML = `<span>D+</span><strong>${i}</strong>`;
            day.onclick = () => showDetail(i);
            grid.appendChild(day);
        }
    }

    function showDetail(day) {
        const data = db[day] || { note: "尚未紀錄...", h: "--", w: "--" };
        document.getElementById('mDate').innerText = day + " Days";
        document.getElementById('mNote').innerText = data.note;
        document.getElementById('mH').innerText = data.h || "--";
        document.getElementById('mW').innerText = data.w || "--";
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function toggleDrawer(o) { document.getElementById('drawer').classList.toggle('open', o); document.getElementById('overlay').classList.toggle('active', o); }

    function saveToday() {
        if(!db[currentDay]) db[currentDay] = {};
        db[currentDay].note = document.getElementById('todayNote').value;
        alert("心得與照片已儲存於 D+" + currentDay);
    }

    function saveGrowth() {
        if(!db[currentDay]) db[currentDay] = {};
        db[currentDay].h = document.getElementById('hInput').value;
        db[currentDay].w = document.getElementById('wInput').value;
        alert("數據已同步！");
    }

    function simulateUpload() {
        document.getElementById('photoZone').style.backgroundImage = "url('https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&w=400')";
        document.getElementById('photoZone').innerHTML = ""; // 隱藏文字
        alert("模擬拍照成功！");
    }

    updateUI();
</script>

</body>
</html>
